<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Converter</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3348;
      --text: #e8e9ed;
      --text-dim: #8b8fa3;
      --accent: #e8a43a;
      --accent-dim: rgba(232, 164, 58, 0.12);
      --success: #3dd68c;
      --danger: #e85d5d;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(232,164,58,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(61,214,140,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    header {
      text-align: center;
      padding: 20px 0 28px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    header p {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-label .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-from { background: var(--accent); }
    .dot-to { background: var(--success); }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      font-weight: 500;
    }

    select, input[type="date"], input[type="time"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }

    select { cursor: pointer; padding-right: 32px; }

    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    select:focus, input:focus {
      border-color: var(--accent);
    }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tz-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .tz-row .select-wrapper {
      flex: 1;
      min-width: 0;
    }

    .action-btn {
      flex-shrink: 0;
      height: 40px;
      padding: 0 11px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
      font-family: inherit;
      font-weight: 500;
      white-space: nowrap;
    }
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .action-btn:active {
      transform: scale(0.96);
    }

    .swap-row {
      display: flex;
      justify-content: center;
      margin: -6px 0;
      position: relative;
      z-index: 2;
    }

    .swap-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }

    .swap-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .swap-btn:active {
      transform: scale(0.92);
    }

    .swap-btn.flipped {
      transform: rotate(180deg);
    }
    .swap-btn.flipped:active {
      transform: rotate(180deg) scale(0.92);
    }

    /* Save button row */
    .save-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .save-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }

    .save-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .save-btn:active {
      transform: scale(0.96);
    }

    .save-btn .star {
      font-size: 16px;
      transition: transform 0.3s, color 0.3s;
    }

    .save-btn.is-saved {
      border-color: var(--accent);
      color: var(--accent);
    }

    .save-btn.is-saved .star {
      color: var(--accent);
      transform: scale(1.15);
    }

    /* Result area */
    .result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      margin-top: 12px;
      transition: border-color 0.3s;
    }

    .result.active {
      border-color: rgba(61, 214, 140, 0.3);
    }

    .result-time {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      color: var(--success);
      line-height: 1.2;
    }

    .result-date {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .result-tz-name {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .dst-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .dst-on {
      background: rgba(232, 164, 58, 0.15);
      color: var(--accent);
    }

    .dst-off {
      background: rgba(139, 143, 163, 0.12);
      color: var(--text-dim);
    }

    .result-placeholder {
      color: var(--text-dim);
      font-size: 14px;
      padding: 10px 0;
    }

    .offset-diff {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .offset-diff span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Favorites section ── */
    .favorites-section {
      margin-top: 16px;
    }

    .favorites-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 10px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .favorites-header::before,
    .favorites-header::after {
      content: '';
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: var(--border);
    }

    .favorites-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .fav-item {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .fav-item:hover {
      border-color: rgba(232, 164, 58, 0.3);
    }

    .fav-item.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .fav-select {
      flex: 1;
      padding: 10px 12px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      min-width: 0;
    }

    .fav-select:hover {
      color: var(--accent);
    }

    .fav-arrow {
      color: var(--text-dim);
      font-size: 12px;
      flex-shrink: 0;
    }

    .fav-route {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .fav-city {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fav-delete {
      flex-shrink: 0;
      width: 36px;
      height: 100%;
      min-height: 40px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .fav-delete:hover {
      background: rgba(232, 93, 93, 0.12);
      color: var(--danger);
    }

    .fav-delete:active {
      transform: scale(0.9);
    }

    .favorites-empty {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      padding: 12px 0;
      opacity: 0.6;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      font-family: inherit;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .now-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      margin-left: auto;
      transition: all 0.2s;
    }
    .now-btn:hover {
      background: var(--accent-dim);
    }

    @media (max-width: 360px) {
      .result-time { font-size: 32px; }
      .row { grid-template-columns: 1fr; }
      .action-btn { padding: 0 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>Timezone Converter</h1>
    <p>Convert times across the world</p>
  </header>

  <!-- FROM card -->
  <div class="card">
    <div class="card-label">
      <span class="dot dot-from"></span> From
      <button class="now-btn" id="nowBtn">Now</button>
    </div>
    <div class="field">
      <label>Timezone</label>
      <div class="tz-row">
        <div class="select-wrapper">
          <select id="fromTz"></select>
        </div>
        <button class="action-btn" id="fromLocalBtn" title="Set to my local timezone">
          <span>📍</span> My TZ
        </button>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="fromDate">Date</label>
        <input type="date" id="fromDate">
      </div>
      <div class="field">
        <label for="fromTime">Time (24h)</label>
        <input type="time" id="fromTime">
      </div>
    </div>
  </div>

  <!-- Swap button -->
  <div class="swap-row">
    <button class="swap-btn" id="swapBtn" aria-label="Swap timezones">⇅</button>
  </div>

  <!-- TO card -->
  <div class="card">
    <div class="card-label">
      <span class="dot dot-to"></span> To
    </div>
    <div class="field">
      <label>Timezone</label>
      <div class="tz-row">
        <div class="select-wrapper">
          <select id="toTz"></select>
        </div>
        <button class="action-btn" id="toLocalBtn" title="Set to my local timezone">
          <span>📍</span> My TZ
        </button>
      </div>
    </div>
  </div>

  <!-- Save favorite -->
  <div class="save-row">
    <button class="save-btn" id="saveBtn">
      <span class="star">☆</span> Save as Favorite
    </button>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-placeholder">Enter a date and time above</div>
  </div>

  <!-- Favorites list -->
  <div class="favorites-section" id="favoritesSection">
    <div class="favorites-header">Favorites</div>
    <div class="favorites-list" id="favoritesList"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script>
  // ── Pure helper functions ──

  const getLocalTimezone = () => Intl.DateTimeFormat().resolvedOptions().timeZone;

  const getAllTimezones = () => {
    try {
      return Intl.supportedValuesOf('timeZone');
    } catch {
      return [
        'UTC', 'America/New_York', 'America/Chicago', 'America/Denver',
        'America/Los_Angeles', 'America/Anchorage', 'Pacific/Honolulu',
        'America/Toronto', 'America/Mexico_City', 'America/Sao_Paulo',
        'America/Buenos_Aires', 'Europe/London', 'Europe/Paris',
        'Europe/Berlin', 'Europe/Moscow', 'Europe/Istanbul',
        'Africa/Cairo', 'Africa/Lagos', 'Africa/Johannesburg',
        'Asia/Dubai', 'Asia/Kolkata', 'Asia/Bangkok', 'Asia/Shanghai',
        'Asia/Hong_Kong', 'Asia/Tokyo', 'Asia/Seoul', 'Asia/Singapore',
        'Australia/Sydney', 'Australia/Melbourne', 'Pacific/Auckland',
      ];
    }
  };

  const buildDateInTimezone = (dateStr, timeStr, tz) => {
    const [year, month, day] = dateStr.split('-').map(Number);
    const [hour, minute] = timeStr.split(':').map(Number);

    const formatter = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
      timeZoneName: 'longOffset',
    });

    const naive = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));
    const parts = formatter.formatToParts(naive);
    const getPart = (type) => parts.find(p => p.type === type)?.value;

    const fmtHour = parseInt(getPart('hour') || '0', 10);
    const fmtMinute = parseInt(getPart('minute') || '0', 10);
    const fmtDay = parseInt(getPart('day') || '1', 10);
    const fmtMonth = parseInt(getPart('month') || '1', 10);
    const fmtYear = parseInt(getPart('year') || '2024', 10);

    const desiredMins = hour * 60 + minute;
    const fmtMins = fmtHour * 60 + fmtMinute;
    const offsetCorrectionMins = desiredMins - fmtMins;

    const desiredDayTotal = year * 10000 + month * 100 + day;
    const fmtDayTotal = fmtYear * 10000 + fmtMonth * 100 + fmtDay;
    const dayDiff = desiredDayTotal - fmtDayTotal;
    const correctionMs = (dayDiff * 1440 + offsetCorrectionMins) * 60000;

    return new Date(naive.getTime() + correctionMs);
  };

  const formatInTimezone = (date, tz) => {
    const timeFmt = new Intl.DateTimeFormat('en-GB', {
      timeZone: tz,
      hour: '2-digit', minute: '2-digit',
      hour12: false,
    });
    const dateFmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
    });
    return { time: timeFmt.format(date), date: dateFmt.format(date) };
  };

  const getOffset = (tz, date) => {
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      timeZoneName: 'shortOffset',
    });
    return fmt.formatToParts(date).find(p => p.type === 'timeZoneName')?.value || '';
  };

  const isDST = (tz, date) => {
    const year = date.getFullYear();
    const jan = new Date(Date.UTC(year, 0, 15));
    const jul = new Date(Date.UTC(year, 6, 15));

    const getOffsetMins = (d) => {
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: tz,
        timeZoneName: 'longOffset',
      });
      const str = fmt.formatToParts(d).find(p => p.type === 'timeZoneName')?.value || '';
      const match = str.match(/GMT([+-])(\d{1,2}):?(\d{2})/);
      if (!match) return 0;
      const sign = match[1] === '+' ? 1 : -1;
      return sign * (parseInt(match[2], 10) * 60 + parseInt(match[3], 10));
    };

    const currentOffset = getOffsetMins(date);
    const janOffset = getOffsetMins(jan);
    const julOffset = getOffsetMins(jul);
    const isSouthernDST = julOffset < janOffset;
    const realStandard = isSouthernDST ? julOffset : janOffset;
    return currentOffset !== realStandard;
  };

  const offsetDiffHours = (fromTz, toTz, date) => {
    const getOffMin = (tz) => {
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: tz,
        timeZoneName: 'longOffset',
      });
      const str = fmt.formatToParts(date).find(p => p.type === 'timeZoneName')?.value || '';
      const match = str.match(/GMT([+-])(\d{1,2}):?(\d{2})/);
      if (!match) return 0;
      const sign = match[1] === '+' ? 1 : -1;
      return sign * (parseInt(match[2], 10) * 60 + parseInt(match[3], 10));
    };
    const diff = getOffMin(toTz) - getOffMin(fromTz);
    const hours = diff / 60;
    if (hours === Math.floor(hours)) return (hours > 0 ? '+' : '') + hours;
    const h = Math.floor(Math.abs(hours));
    const m = Math.round((Math.abs(hours) - h) * 60);
    return (hours > 0 ? '+' : '-') + h + ':' + String(m).padStart(2, '0');
  };

  const groupTimezones = (tzs) => {
    const groups = {};
    tzs.forEach(tz => {
      const region = tz.split('/')[0];
      if (!groups[region]) groups[region] = [];
      groups[region].push(tz);
    });
    return groups;
  };

  const createOption = (value, text, selected = false) => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = text;
    opt.selected = selected;
    return opt;
  };

  /** Short display name: "Europe/London" → "London" */
  const shortName = (tz) => {
    const parts = tz.split('/');
    return parts[parts.length - 1].replace(/_/g, ' ');
  };

  /** Full display: "Europe / London" */
  const tzLabel = (tz) => tz.replace(/_/g, ' ').replace(/\//g, ' / ');

  // ── LocalStorage favorites ──

  const STORAGE_KEY = 'tz_converter_favorites';

  const loadFavorites = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  };

  const saveFavorites = (favs) => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
  };

  /** Favorite shape: { from: string, to: string } */
  const favoriteKey = (fav) => `${fav.from}→${fav.to}`;

  const isFavorite = (favs, from, to) => favs.some(f => f.from === from && f.to === to);

  const addFavorite = (favs, from, to) => {
    const updated = [...favs, { from, to }];
    saveFavorites(updated);
    return updated;
  };

  const removeFavorite = (favs, from, to) => {
    const updated = favs.filter(f => !(f.from === from && f.to === to));
    saveFavorites(updated);
    return updated;
  };

  // ── Toast ──

  let toastTimer = null;
  const showToast = (message) => {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  };

  // ── DOM references ──

  const fromTzSelect = document.getElementById('fromTz');
  const toTzSelect = document.getElementById('toTz');
  const fromDateInput = document.getElementById('fromDate');
  const fromTimeInput = document.getElementById('fromTime');
  const resultDiv = document.getElementById('result');
  const swapBtn = document.getElementById('swapBtn');
  const nowBtn = document.getElementById('nowBtn');
  const saveBtn = document.getElementById('saveBtn');
  const favoritesList = document.getElementById('favoritesList');
  const favoritesSection = document.getElementById('favoritesSection');
  const fromLocalBtn = document.getElementById('fromLocalBtn');
  const toLocalBtn = document.getElementById('toLocalBtn');

  // ── State ──
  let favorites = loadFavorites();

  // ── Populate timezone selects ──

  const populateTimezoneSelect = (select, defaultTz, defaultSelected = false) => {
    const timezones = getAllTimezones();
    const groups = groupTimezones(timezones);

    select.appendChild(
      createOption(defaultTz, '📍 Local (' + defaultTz.replace(/_/g, ' ') + ')', defaultSelected)
    );

    Object.entries(groups).forEach(([region, tzs]) => {
      const optgroup = document.createElement('optgroup');
      optgroup.label = region;
      tzs.forEach(tz => {
        if (tz !== defaultTz) optgroup.appendChild(createOption(tz, tzLabel(tz)));
      });
      select.appendChild(optgroup);
    });
  };

  const localTz = getLocalTimezone();
  populateTimezoneSelect(fromTzSelect, localTz, true);

  const guessToTz = () => {
    const candidates = ['America/New_York', 'Europe/London', 'Asia/Tokyo', 'UTC'];
    return candidates.find(tz => tz !== localTz) || 'UTC';
  };

  populateTimezoneSelect(toTzSelect, localTz, false);
  toTzSelect.value = guessToTz();

  // ── Set defaults to current date/time ──

  const setNow = () => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    fromDateInput.value = `${y}-${m}-${d}`;
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    fromTimeInput.value = `${hh}:${mm}`;
  };

  setNow();

  // ── Conversion & rendering ──

  const convert = () => {
    const fromTz = fromTzSelect.value;
    const toTz = toTzSelect.value;
    const dateVal = fromDateInput.value;
    const timeVal = fromTimeInput.value;

    updateSaveButton();

    if (!dateVal || !timeVal) {
      resultDiv.innerHTML = '<div class="result-placeholder">Enter a date and time above</div>';
      resultDiv.classList.remove('active');
      return;
    }

    try {
      const date = buildDateInTimezone(dateVal, timeVal, fromTz);
      const result = formatInTimezone(date, toTz);
      const toDst = isDST(toTz, date);
      const fromOffset = getOffset(fromTz, date);
      const toOffset = getOffset(toTz, date);
      const diff = offsetDiffHours(fromTz, toTz, date);

      resultDiv.classList.add('active');
      resultDiv.innerHTML = `
        <div class="result-time">${result.time}</div>
        <div class="result-date">${result.date}</div>
        <div class="result-tz-name">
          ${tzLabel(toTz)} · ${toOffset}
          <span class="dst-badge ${toDst ? 'dst-on' : 'dst-off'}">${toDst ? 'DST' : 'Standard'}</span>
        </div>
        <div class="offset-diff">Difference: <span>${diff}h</span> from source (${fromOffset})</div>
      `;
    } catch (e) {
      resultDiv.classList.remove('active');
      resultDiv.innerHTML = '<div class="result-placeholder" style="color:#e85d5d;">Could not convert. Check your inputs.</div>';
      console.error(e);
    }
  };

  // ── Save button state ──

  const updateSaveButton = () => {
    const fromTz = fromTzSelect.value;
    const toTz = toTzSelect.value;
    const saved = isFavorite(favorites, fromTz, toTz);

    saveBtn.classList.toggle('is-saved', saved);
    saveBtn.querySelector('.star').textContent = saved ? '★' : '☆';
    saveBtn.querySelector('.star').nextSibling.textContent = saved ? ' Saved' : ' Save as Favorite';
  };

  // ── Render favorites list ──

  const renderFavorites = () => {
    favoritesList.innerHTML = '';

    if (favorites.length === 0) {
      favoritesSection.style.display = 'none';
      return;
    }

    favoritesSection.style.display = '';

    const currentFrom = fromTzSelect.value;
    const currentTo = toTzSelect.value;

    favorites.forEach((fav) => {
      const item = document.createElement('div');
      item.className = 'fav-item';

      // Highlight if this is the current pair
      if (fav.from === currentFrom && fav.to === currentTo) {
        item.classList.add('active');
      }

      // Clickable route label
      const selectBtn = document.createElement('button');
      selectBtn.className = 'fav-select';
      selectBtn.innerHTML = `
        <span class="fav-route">
          <span class="fav-city">${shortName(fav.from)}</span>
          <span class="fav-arrow">→</span>
          <span class="fav-city">${shortName(fav.to)}</span>
        </span>
      `;
      selectBtn.title = `${tzLabel(fav.from)} → ${tzLabel(fav.to)}`;
      selectBtn.addEventListener('click', () => {
        fromTzSelect.value = fav.from;
        toTzSelect.value = fav.to;
        convert();
        renderFavorites();
        showToast(`Loaded ${shortName(fav.from)} → ${shortName(fav.to)}`);
      });

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'fav-delete';
      delBtn.innerHTML = '✕';
      delBtn.title = 'Remove favorite';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        favorites = removeFavorite(favorites, fav.from, fav.to);
        renderFavorites();
        updateSaveButton();
        showToast('Favorite removed');
      });

      item.appendChild(selectBtn);
      item.appendChild(delBtn);
      favoritesList.appendChild(item);
    });
  };

  // ── Event listeners ──

  fromTzSelect.addEventListener('change', () => { convert(); renderFavorites(); });
  toTzSelect.addEventListener('change', () => { convert(); renderFavorites(); });
  fromDateInput.addEventListener('change', convert);
  fromTimeInput.addEventListener('input', convert);

  nowBtn.addEventListener('click', () => { setNow(); convert(); });

  swapBtn.addEventListener('click', () => {
    const tempTz = fromTzSelect.value;
    fromTzSelect.value = toTzSelect.value;
    toTzSelect.value = tempTz;
    swapBtn.classList.toggle('flipped');
    convert();
    renderFavorites();
  });

  fromLocalBtn.addEventListener('click', () => {
    fromTzSelect.value = localTz;
    convert();
    renderFavorites();
  });

  toLocalBtn.addEventListener('click', () => {
    toTzSelect.value = localTz;
    convert();
    renderFavorites();
  });

  saveBtn.addEventListener('click', () => {
    const from = fromTzSelect.value;
    const to = toTzSelect.value;

    if (isFavorite(favorites, from, to)) {
      // Already saved — remove it
      favorites = removeFavorite(favorites, from, to);
      showToast('Favorite removed');
    } else {
      favorites = addFavorite(favorites, from, to);
      showToast(`Saved ${shortName(from)} → ${shortName(to)}`);
    }

    updateSaveButton();
    renderFavorites();
  });

  // ── Initial render ──

  convert();
  updateSaveButton();
  renderFavorites();
</script>

</body>
</html>
